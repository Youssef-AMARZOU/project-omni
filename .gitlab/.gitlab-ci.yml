stages:
  - build
  - test
  - deploy

variables:
  POSTGRES_USER: omni
  POSTGRES_PASSWORD: omni_password
  POSTGRES_DB: omni_test
  QDRANT_URL: http://qdrant:6333
  MONGO_URL: mongodb://omni:omni_password@mongodb:27017/omni_test?authSource=admin
  REDIS_URL: redis://redis:6379/0

services:
  - postgres:15-alpine
  - qdrant/qdrant:latest
  - mongo:7-jammy
  - redis:7-alpine

build:
  stage: build
  image: python:3.11-slim
  before_script:
    - cd src && pip install -r requirements.txt
  script:
    - echo "Build OK"
  cache:
    paths:
      - src/__pycache__/

test:
  stage: test
  image: python:3.11-slim
  before_script:
    - cd src && pip install -r requirements.txt
    - pip install pytest pytest-asyncio pytest-cov ruff mypy
  script:
    - ruff check src/
    - mypy src/ --ignore-missing-imports
    - pytest tests/ -v --cov=src --cov-report=xml
  coverage: '/TOTAL.*?\s+(\d+%)$/'
  artifacts:
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml

deploy:
  stage: deploy
  image: docker:24
  services:
    - docker:24-dind
  script:
    - docker-compose -f docker-compose.yml build
    - docker-compose -f docker-compose.yml up -d
  only:
    - main
